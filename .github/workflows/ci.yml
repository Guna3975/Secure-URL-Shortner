name: CI Pipeline

on:
  push:
    branches: [ "js_branch" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest validators

    - name: Run tests (skip DB-dependent)
      run: PYTHONPATH=. pytest -k "not auth"name: CI Pipeline

